<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart News Dashboard</title>

<style>
body { margin:0; font-family: Arial; display:flex; }
.sidebar {
  width:200px; background:#1f2937; color:white; height:100vh; padding:15px;
}
.sidebar div { margin:10px 0; cursor:pointer; }
.main { flex:1; padding:20px; background:#f3f4f6; }
.news { background:white; padding:10px; margin:10px 0; border-radius:6px; }
.news a { text-decoration:none; color:black; font-weight:bold; }
.source { font-size:12px; color:gray; }
</style>
</head>

<body>

<div class="sidebar">
  <h3>Categories</h3>
  <div onclick="filterNews('all')">All</div>
  <div onclick="filterNews('politics')">Politics</div>
  <div onclick="filterNews('tech')">Tech</div>
</div>

<div class="main">
  <h1>News Feed</h1>
  <div id="news">Loading...</div>
</div>

<script>
const feeds = [
  "https://feeds.bbci.co.uk/news/rss.xml",
  "https://rss.cnn.com/rss/edition.rss"
];

let globalNews = [];

/* safer fetch */
async function fetchFeed(url){
  try{
    const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
    const text = await res.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(text, "text/xml");

    const items = [...xml.querySelectorAll("item")].map(item => ({
      title: item.querySelector("title").textContent,
      link: item.querySelector("link").textContent
    }));

    return items;
  }catch(e){
    console.log("Feed failed:", url);
    return [];
  }
}

/* category */
function getCategory(title){
  title = title.toLowerCase();
  if(title.includes("election")) return "politics";
  if(title.includes("ai") || title.includes("tech")) return "tech";
  return "general";
}

/* load */
async function loadNews(){
  let results = await Promise.all(feeds.map(fetchFeed));
  let all = results.flat();

  /* remove duplicates */
  let seen = new Set();
  all = all.filter(n=>{
    let key = n.title.toLowerCase();
    if(seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  globalNews = all.map(n=>({...n, category:getCategory(n.title)}));

  display(globalNews);
}

/* display */
function display(list){
  let html="";
  list.slice(0,30).forEach(n=>{
    html += `
      <div class="news">
        <a href="${n.link}" target="_blank">${n.title}</a>
        <div class="source">${n.category}</div>
      </div>`;
  });
  document.getElementById("news").innerHTML = html;
}

/* filter */
function filterNews(cat){
  if(cat==="all") display(globalNews);
  else display(globalNews.filter(n=>n.category===cat));
}

loadNews();
</script>

</body>
</html>
